name: NekoJS CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ==========================================
  # 阶段 1：分析 Commit 信息，决定发版策略
  # ==========================================
  analyze-commit:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.match.outputs.is_release }}
      version: ${{ steps.match.outputs.version }}
    steps:
      - name: Extract version from commit message
        id: match
        env:
          # 使用环境变量接收，防止消息中的 @ 等特殊字符被 Bash 解析为命令
          RAW_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          shopt -s nocasematch 
          
          # 正则匹配：查找 update x.y.z 格式
          REGEX="update ([0-9a-zA-Z.-]+)"
          
          if [[ "$RAW_COMMIT_MSG" =~ $REGEX ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "Matched version: $VERSION -> Going for RELEASE"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "No 'update' pattern found -> Going for DEV BUILD"
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # 阶段 2：执行构建与分发
  # ==========================================
  build-and-distribute:
    needs: analyze-commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # --- 公共流程 ---
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Mod
        run: ./gradlew clean build

      # --- 【开发版专用】重命名产物 ---
      - name: Rename Dev Artifacts
        if: needs.analyze-commit.outputs.is_release == 'false'
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cd build/libs
          for f in *.jar; do
            # 排除已标记的文件，避免循环重命名
            if [[ $f != *"-sources.jar"* && $f != *"-dev"* && $f != *"-plain.jar"* ]]; then
              mv "$f" "${f%.jar}-dev-${SHORT_SHA}.jar"
            fi
          done

      - name: Upload Dev Artifact
        if: needs.analyze-commit.outputs.is_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: NekoJS-Dev-Build
          path: build/libs/*.jar
          retention-days: 14

      # --- 【发版专用】生成更新日志 ---
      - name: Generate Changelog
        if: needs.analyze-commit.outputs.is_release == 'true'
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"* %s (%h)")
          else
            COMMITS=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"* %s (%h)")
          fi
          
          # 使用 GitHub 推荐的 EOF 方式处理多行文本
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      # --- 【发版专用】创建 GitHub Release ---
      - name: Create GitHub Release
        if: needs.analyze-commit.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.analyze-commit.outputs.version }}
          name: NekoJS v${{ needs.analyze-commit.outputs.version }}
          body: |
            ### 📝 更新日志 (Changelog)
            ${{ steps.changelog.outputs.notes }}
          files: |
            build/libs/*.jar
            !build/libs/*-dev-*.jar

      # --- 【发版专用】自动推送至 Mod 平台 ---
      - name: Publish to Mod Platforms
        if: needs.analyze-commit.outputs.is_release == 'true'
        env:
          CURSEFORGE_KEY: ${{ secrets.CURSEFORGE_KEY }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ steps.changelog.outputs.notes }}
        run: ./gradlew publishUnified