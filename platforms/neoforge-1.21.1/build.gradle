plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.140'
    id "me.shedaniel.unified-publishing" version "0.1.+"
}

version = mod_version
group = mod_group_id

def neo_version = "21.1.227"
def minecraft_version = "1.21.1"
def minecraft_version_range= "[1.21,1.22)"
def neo_version_range= "[21.1,22.0)"
def ENV = System.getenv()

base {
    archivesName = "${mod_id}-neoforge-${minecraft_version}"
}

// ✅ 用 21，别再用 25（NeoForge + LWJGL 更稳定）
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

sourceSets {
    main {
        java {
            srcDirs = [
                    'src/main/java',
                    project(':common').file('src/main/java')
            ]
        }
        resources {
            srcDirs = [
                    'src/main/resources',
                    project(':common').file('src/main/resources'),
                    'src/generated/resources'
            ]
        }
    }
}

repositories {
    mavenCentral()
    exclusiveContent {
        forRepository {
            maven { url "https://cursemaven.com" }
        }
        filter { includeGroup "curse.maven" }
    }
}

neoForge {
    version = neo_version

    accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    interfaceInjectionData {
        it.from(project.files('src/main/resources/nekojs.interface_injection.json'))
    }

    runs {
        client {
            client()
            jvmArguments.add('-Dfml.earlydisplay=false')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }
        data {
            data()
            programArguments.addAll '--mod', project.mod_id,
                    '--all',
                    '--output', file('src/generated/resources/').getAbsolutePath(),
                    '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG

            // ⭐⭐⭐ 核心修复：把 classes 强行加入运行时 classpath
//            classpath.from(sourceSets.main.output)
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

dependencies {
    implementation project(':common')

    implementation("curse.maven:graal-1504336:7951071")
    implementation "curse.maven:jei-238222:7420587"

    compileOnly 'org.projectlombok:lombok:1.18.44'
    annotationProcessor 'org.projectlombok:lombok:1.18.44'

    compileOnly 'org.jspecify:jspecify:1.0.0'
}

tasks.withType(JavaExec).configureEach {
    // ⭐⭐⭐ 双保险（防止 dev 环境不吃 sourceSet）
    classpath += files(sourceSets.main.output.classesDirs)
    classpath += files(sourceSets.main.output.resourcesDir)
}

// -------- metadata --------
def generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    def replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            neo_version_range      : neo_version_range,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            mod_authors            : mod_authors,
            mod_description        : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

sourceSets.main.resources.srcDir generateModMetadata
neoForge.ideSyncTask generateModMetadata

tasks.withType(Jar).configureEach {
    archiveBaseName.set("${mod_id}-neoforge")
    archiveVersion.set("${minecraft_version}-${mod_version}")
}

publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

unifiedPublishing {
    project {
        displayName = "${mod_name} NeoForge ${minecraft_version}-${mod_version}"
        releaseType = ENV.RELEASE_TYPE ?: "release"
        gameVersions = [minecraft_version]
        gameLoaders = ["neoforge"]

        mainPublication tasks.jar
        changelog = ENV.CHANGELOG ?: "A new update for ${mod_name}!"

        relations {
            depends {
                curseforge = "graal"
            }
        }

        if (ENV.CURSEFORGE_KEY) {
            curseforge {
                token = ENV.CURSEFORGE_KEY
                id = project.curseforge_id
            }
        }

        if (ENV.MODRINTH_TOKEN) {
            modrinth {
                token = ENV.MODRINTH_TOKEN
                id = project.modrinth_id
                version = "${minecraft_version}-${mod_version}"
            }
        }
    }
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}